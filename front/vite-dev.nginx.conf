# 开发环境：浏览器 → 域名 HTTPS → 本机 Vite（npm run dev，默认 5173）
# 常见错误：对根路径使用「静态目录 + try_files … /index.html」，会导致
# /@vite/client、/@react-refresh、/src/*.jsx 全部变成 text/html，浏览器报 MIME 错。
#
# 用法：按需改 server_name、ssl、端口；include 到 http{} 或粘贴进现有 server{}。
# API 与前端分开反代：先匹配 /api 再匹配 /。

upstream hj_api_dev {
    server 127.0.0.1:8000;
}

upstream hj_vite_dev {
    server 127.0.0.1:5173;
}

server {
    listen 443 ssl;
    server_name huijin.ikun.center;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    location /api/ {
        proxy_pass http://hj_api_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://hj_vite_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
